  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .logo {
      max-height: 70px;
      object-fit: contain;
      margin-bottom: 20px;
      filter: invert(1) brightness(1.1);
    }

    .authority {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #FF6B35;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .headline {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 8px;
      max-width: 340px;
    }

    .headline span {
      color: #E63022;
    }

    .sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      margin-bottom: 32px;
      max-width: 320px;
      line-height: 1.5;
    }

    .links {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      display: block;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(230, 48, 34, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    .link-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 24px rgba(230, 48, 34, 0.25);
    }

    .link-card:active {
      transform: scale(0.98);
    }

    .link-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      margin-top: 40px;
      font-size: 11px;
      color: rgba(255,255,255,0.12);
    }
  </style>

<body>

  <p class="authority">VFX Artist &nbsp;·&nbsp; Motion Graphics &nbsp;·&nbsp; Formaciones para creadores reales</p>

  <h1 class="headline">Aprende conmigo y avanza en el mercado audiovisual</h1>

  <p class="sub">Aquí tienes todo lo que he creado para ayudarte a vivir de lo que amas.</p>

  <div class="links">
    <a class="link-card" href="https://elpoderdelvfx.jlmotionvfx.com/" target="_blank" rel="noopener">
      <img src="elpoder.png" alt="El Poder del VFX" />
    </a>
    <a class="link-card" href="https://cursovfx.jlmotionvfx.com/" target="_blank" rel="noopener">
      <img src="vfx.png" alt="VFX" />
    </a>
    <a class="link-card" href="https://cursomotion.jlmotionvfx.com/" target="_blank" rel="noopener">
      <img src="motion.png" alt="Motion Graphics" />
    </a>
  </div>

  <footer>© JL Motion VFX</footer>

</body>
</html>
